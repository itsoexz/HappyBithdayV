<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un regalo para ti</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="castle">
        <div class="text-overlay">
            <h1>A flower for another flower who's one year older :)</h1>
            <p>I hope u like this flower, its the only flower i can give u from here :.)</p>
        </div>

        <div id="table">
            <div class="table-text"></div>
        </div>

        <div id="main" class="shade-wrap hover-animation">
            <div id="flower-wrap">
                <div id="stem"></div>
                <div id="petal1"></div>
                <div id="petal2"></div>
                <div id="petal3"></div>
                <div id="petal4"></div>
                <div id="petal5"></div>
                <div id="falling-petal"></div>
                <div id="leaf1"></div>
                <div id="leaf2"></div>
            </div>

            <div id="sub" class="shade-wrap">
                <div id="shade-main-reflections"></div>
                <div id="shade-main">
                    <div id="shade-handle-big"></div>
                    <div id="shade-handle-small"></div>
                    <div id="top-reflection"></div>
                    <div id="bottom-shade"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
